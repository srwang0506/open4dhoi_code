# VideoBodyObjectOptimizer default hyperparameters
# Note: Explicit arguments to optimize() will override these defaults.

optimize:
  steps: 100
  print_every: 10
  optimize_interval: 3

loss_weights:
  contact: 50.0
  collision: 8.0
  mask: 0.05

smoothing:
  alpha: 0.25
  beta: 0.25
  window: 7
  passes: 2
  method: ema_box   # options: ema | ema_box | gaussian

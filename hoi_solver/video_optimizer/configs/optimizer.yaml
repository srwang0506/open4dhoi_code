# VideoBodyObjectOptimizer default hyperparameters
# Note: if parameters are explicitly passed in optimize(), they will override these defaults.

optimize:
  steps: 50
  print_every: 10
  optimize_interval: 3

loss_weights:
  contact: 50.0
  collision: 8.0
  mask: 0.05

smoothing:
  enable: False
  alpha: 0.25
  beta: 0.25
  window: 7
  passes: 2
  method: ema_box   # Options: ema | ema_box | gaussian
